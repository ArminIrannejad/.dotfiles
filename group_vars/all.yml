git_user_name: "ArminIrannejad"
git_user_email: "armin.irannejad@gmail.com"

default_roles:
  - developer_tools
  - git
  - go
  - haskell
  - lua
  - neovim
  - podman
  - python_dev
  - starship
  - system
  - terraform
  - tmux
  - uv
  - zsh

exclude_roles: []
exclude_roles_by_distribution: {}

system_update_packages: false
zsh_default_shell: true
neovim_enabled: true
starship_enabled: true

# Ubuntu installs Neovim from the upstream stable tarball; Fedora uses dnf.
neovim_install_dir: /opt/nvim

haskell_ghc_version: "9.10.3"
haskell_cabal_version: "3.14.2.0"
haskell_stack_version: "3.7.1"
haskell_hls_version: "2.13.0.0"

codex_update: false
databricks_update: false

config_dir: "{{ ansible_facts['env']['HOME'] }}/.config"
bin_dir: "{{ ansible_facts['env']['HOME'] }}/.local/bin"

packages_common_ubuntu:
  - git
  - zsh
  - ripgrep
  - fzf
  - fd-find
  - bat
  - curl
  - wget
  - neovim
  - npm
  - nodejs
  - tmux
  - unzip
  - btop
  - build-essential
  - tree
  - python3
  - python3-pip

packages_optional_ubuntu:
  - zoxide
  - eza

packages_common_fedora:
  - git
  - zsh
  - ripgrep
  - fzf
  - fd-find
  - zoxide
  - bat
  - curl
  - wget
  - neovim
  - npm
  - nodejs
  - tmux
  - unzip
  - btop
  - gcc
  - gcc-c++
  - make
  - tree
  - python3
  - python3-pip

packages_optional_fedora:
  - eza
