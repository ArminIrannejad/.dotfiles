---
- name: "Python dev | Check for distribution config"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ ansible_facts['distribution'] }}.yml"
  register: python_dev_distribution_config

- name: "Python dev | Run distribution tasks"
  ansible.builtin.include_tasks: "{{ ansible_facts['distribution'] }}.yml"
  when: python_dev_distribution_config.stat.exists

- name: "Python dev | Install pre-commit with uv"
  ansible.builtin.command:
    cmd: "{{ bin_dir }}/uv tool install pre-commit"
    creates: "{{ bin_dir }}/pre-commit"
  environment:
    UV_TOOL_BIN_DIR: "{{ bin_dir }}"

- name: "Python dev | Remove legacy global Watchdog install"
  ansible.builtin.command:
    cmd: python3 -m pip uninstall --yes watchdog
    removes: "{{ bin_dir }}/watchmedo"
