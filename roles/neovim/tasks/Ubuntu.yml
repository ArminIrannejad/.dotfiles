---
# roles/neovim/tasks/ubuntu.yml

- name: "Neovim | Ubuntu | Install dependencies"
  ansible.builtin.apt:
    name:
      - cmake
      - curl
      - pkg-config
      - libtool
      - unzip
      - ripgrep
    state: present
    update_cache: true
  become: true
  when: can_install_packages | default(false)

- name: "Neovim | Ubuntu | Add Neovim Nightly PPA"
  ansible.builtin.apt_repository:
    repo: ppa:neovim-ppa/unstable
    state: present
    mode: "0644"
  become: true
  when: can_install_packages | default(false)

- name: "Neovim | Ubuntu | Install Neovim nightly"
  ansible.builtin.apt:
    name: neovim
    state: latest
    update_cache: true
  become: true
  when: can_install_packages | default(false)

- name: "Neovim | Ubuntu | Package installation skipped"
  ansible.builtin.debug:
    msg: "Neovim package installation skipped because sudo is unavailable."
  when: not (can_install_packages | default(false))
