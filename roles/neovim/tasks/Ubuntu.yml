---
# roles/neovim/tasks/ubuntu.yml
# Neovim is installed from the upstream stable tarball rather than a PPA: the
# Ubuntu archive lags badly and neovim-ppa/unstable tracks nightly.

- name: "Neovim | Ubuntu | Remove nightly PPA package"
  ansible.builtin.apt:
    name: neovim
    state: absent
    purge: true
  become: true
  when: can_install_packages | default(false)

# add-apt-repository writes deb822 .sources files on current releases and .list
# files on older ones, so match both rather than using apt_repository, which only
# understands .list and would silently leave the PPA in place.
- name: "Neovim | Ubuntu | Find nightly PPA sources"
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns:
      - "*neovim*.list"
      - "*neovim*.sources"
  register: neovim_ppa_sources

- name: "Neovim | Ubuntu | Remove nightly PPA"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ neovim_ppa_sources.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  become: true
  when: can_install_packages | default(false)

- name: "Neovim | Ubuntu | Install dependencies"
  ansible.builtin.apt:
    name:
      - cmake
      - curl
      - pkg-config
      - libtool
      - unzip
      - ripgrep
    state: present
    update_cache: true
  become: true
  when: can_install_packages | default(false)

- name: "Neovim | Ubuntu | Define release asset"
  ansible.builtin.set_fact:
    neovim_asset: "nvim-linux-{{ 'arm64' if ansible_facts['machine'] == 'aarch64' else 'x86_64' }}"

- name: "Neovim | Ubuntu | Getting version information"
  ansible.builtin.command: "{{ neovim_install_dir }}/bin/nvim --version"
  register: neovim_installed
  changed_when: false
  failed_when: false

# /releases/latest never resolves to a prerelease, so this tracks stable only.
- name: "Neovim | Ubuntu | Querying latest stable release"
  ansible.builtin.uri:
    url: https://api.github.com/repos/neovim/neovim/releases/latest
    headers:
      Accept: application/vnd.github+json
  register: neovim_release
  changed_when: false

- name: "Neovim | Ubuntu | Register versions"
  ansible.builtin.set_fact:
    neovim_latest_version: "{{ neovim_release.json.tag_name }}"
    neovim_current_version: "{{ neovim_installed.stdout | default('') | regex_search('v[0-9]+\\.[0-9]+\\.[0-9]+') | default('none', true) }}"

- name: "Neovim | Ubuntu | Install"
  when:
    - can_install_packages | default(false)
    - neovim_current_version != neovim_latest_version
  block:
    - name: "Neovim | Ubuntu | Downloading {{ neovim_latest_version }}"
      ansible.builtin.get_url:
        url: "https://github.com/neovim/neovim/releases/download/{{ neovim_latest_version }}/{{ neovim_asset }}.tar.gz"
        dest: "/tmp/{{ neovim_asset }}.tar.gz"
        mode: "0644"
        force: true

    - name: "Neovim | Ubuntu | Remove any current Neovim installation"
      ansible.builtin.file:
        path: "{{ neovim_install_dir }}"
        state: absent
      become: true

    - name: "Neovim | Ubuntu | Create install directory"
      ansible.builtin.file:
        path: "{{ neovim_install_dir }}"
        state: directory
        mode: "0755"
      become: true

    - name: "Neovim | Ubuntu | Extract tarball"
      ansible.builtin.unarchive:
        src: "/tmp/{{ neovim_asset }}.tar.gz"
        dest: "{{ neovim_install_dir }}"
        remote_src: true
        extra_opts:
          - --strip-components=1
      become: true

    - name: "Neovim | Ubuntu | Link nvim onto PATH"
      ansible.builtin.file:
        src: "{{ neovim_install_dir }}/bin/nvim"
        dest: /usr/local/bin/nvim
        state: link
        force: true
      become: true

    - name: "Neovim | Ubuntu | Report version change"
      ansible.builtin.debug:
        msg: "Neovim updated: {{ neovim_current_version }} -> {{ neovim_latest_version }}"

  always:
    - name: "Neovim | Ubuntu | Cleanup downloaded tarball"
      ansible.builtin.file:
        path: "/tmp/{{ neovim_asset }}.tar.gz"
        state: absent

- name: "Neovim | Ubuntu | Package installation skipped"
  ansible.builtin.debug:
    msg: "Neovim package installation skipped because sudo is unavailable."
  when: not (can_install_packages | default(false))
