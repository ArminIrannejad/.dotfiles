---
- name: "Neovim | {{ ansible_facts['distribution'] }} | Install dependencies"
  ansible.builtin.dnf:
    name:
      - cmake
      - curl
      - gcc
      - gcc-c++
      - libtool
      - make
      - pkgconfig
      - ripgrep
      - tree-sitter-cli
      - unzip
    state: present
  become: true
  when: can_install_packages | default(false)

- name: "Neovim | {{ ansible_facts['distribution'] }} | Install Neovim"
  ansible.builtin.dnf:
    name: neovim
    state: present
  become: true
  when: can_install_packages | default(false)

- name: "Neovim | {{ ansible_facts['distribution'] }} | Check duplicate Cargo tree-sitter"
  ansible.builtin.stat:
    path: "{{ ansible_facts['user_dir'] }}/.cargo/bin/tree-sitter"
  register: neovim_cargo_tree_sitter

- name: "Neovim | {{ ansible_facts['distribution'] }} | Check system tree-sitter"
  ansible.builtin.command: rpm -q tree-sitter-cli
  register: neovim_system_tree_sitter
  check_mode: false
  changed_when: false
  failed_when: false

- name: "Neovim | {{ ansible_facts['distribution'] }} | Remove duplicate Cargo tree-sitter"
  ansible.builtin.command:
    cmd: cargo uninstall tree-sitter-cli
    removes: "{{ ansible_facts['user_dir'] }}/.cargo/bin/tree-sitter"
  environment:
    PATH: "{{ ansible_facts['user_dir'] }}/.cargo/bin:{{ ansible_facts['env']['PATH'] }}"
  when:
    - neovim_cargo_tree_sitter.stat.exists
    - neovim_system_tree_sitter.rc == 0

- name: "Neovim | {{ ansible_facts['distribution'] }} | Package installation skipped"
  ansible.builtin.debug:
    msg: "Neovim package installation skipped because sudo is unavailable."
  # display_ok_hosts is off, which hides 'ok' results; force this to report as
  # changed so the warning is never silently swallowed.
  changed_when: true
  when: not (can_install_packages | default(false))
