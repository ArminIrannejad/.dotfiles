set -g default-terminal "tmux-256color"
set -as terminal-features "*:RGB"
set -s escape-time 0

unbind r
bind r source-file ~/.tmux.conf \; display-message "   Conf Reloaded...   "
set -g base-index 1

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection

# WSLg bridges the wayland clipboard to the Windows one, so wl-copy is enough.
# clip.exe is on PATH but needs WSL interop, which this distro doesn't register.
if-shell 'command -v wl-copy >/dev/null 2>&1' {
  set -g @copy  'wl-copy'
  set -g @paste 'wl-paste -n'
} {
  set -g @copy  'xsel -i -b'
  set -g @paste 'xsel -o -b'
}
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "#{@copy}"

 bind V split-window -h
 bind H split-window -v
 bind q kill-pane

bind -r ^ last-window
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind -r C-h resize-pane -L
bind -r C-j resize-pane -D
bind -r C-k resize-pane -U
bind -r C-l resize-pane -R

set -g status-position top
set -g status on
set -g status-justify centre
set -g status-style "bg=#1f1f1f,fg=#d0d0d0"
setw -g window-status-style         "bg=#1f1f1f,fg=#a8a8a8"
setw -g window-status-current-style "bg=#1f1f1f,fg=#ffffff,bold"
set -g message-style "bg=#1f1f1f,fg=#d0d0d0"
set -g status-left ' #[bold][#S]#[nobold] '
set -g status-left-length 40
set -g status-right ' #[bold]Tsoding#[nobold] %H:%M:%S %Y-%m-%d '
setw -g window-status-format         '  #I:#W #[fg=#666666]#[default]  '
setw -g window-status-current-format '  #[bold]#I:#W#[nobold] #[fg=#e0af68]★#[default]  '

set -g status-interval 1
bind C-a set -w status on
bind C-o set -w status off


set -g mouse on
set -g set-clipboard on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"

bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "#{@copy}"
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "#{@copy}"
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "#{@copy}"
bind -n DoubleClick1Pane select-pane -t = \; if -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" { copy-mode -H ; send-keys -X select-word ; run-shell -d 0.3 ; send-keys -X copy-pipe-and-cancel "#{@copy}" }
bind -n TripleClick1Pane select-pane -t = \; if -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" { copy-mode -H ; send-keys -X select-line ; run-shell -d 0.3 ; send-keys -X copy-pipe-and-cancel "#{@copy}" }

bind -n MouseDown3Pane if -F "#{mouse_any_flag}" "send-keys -M" { run-shell -b "#{@paste} | tmux load-buffer - && tmux paste-buffer -p -t '#{pane_id}'" }
