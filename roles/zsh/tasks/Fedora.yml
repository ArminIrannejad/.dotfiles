---
- name: "Zsh | {{ ansible_facts['distribution'] }} | Install zsh packages"
  ansible.builtin.dnf:
    name:
      - zsh
      - git
      - fzf
      - zoxide
    state: present
  become: true
  when: can_install_packages | default(false)

- name: "Zsh | {{ ansible_facts['distribution'] }} | Copy global zshenv"
  ansible.builtin.copy:
    src: global.zshenv
    dest: /etc/zshenv
    owner: root
    group: root
    mode: "0644"
  become: true
  when: can_install_packages | default(false)

- name: "Zsh | {{ ansible_facts['distribution'] }} | Set default shell"
  ansible.builtin.user:
    name: "{{ host_user }}"
    shell: /usr/bin/zsh
  become: true
  when:
    - zsh_default_shell | default(true)
    - can_install_packages | default(false)
