---
- name: "Developer tools | Ubuntu | Install packages"
  ansible.builtin.apt:
    name:
      - build-essential
      - clang
      - cmake
      - hyperfine
      - jq
      - libtool
    state: present
    update_cache: true
  become: true
  when: can_install_packages | default(false)

- name: "Developer tools | Ubuntu | Install optional packages"
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  loop:
    - fastfetch
  become: true
  register: developer_tools_optional
  failed_when: false
  when: can_install_packages | default(false)

- name: "Developer tools | Ubuntu | Report unavailable optional packages"
  ansible.builtin.debug:
    msg: "Optional packages unavailable on this release, skipped: {{ developer_tools_unavailable | join(', ') }}"
  vars:
    developer_tools_unavailable: "{{ developer_tools_optional.results | default([]) | selectattr('msg', 'defined') | map(attribute='item') | list }}"
  when: developer_tools_unavailable | length > 0
