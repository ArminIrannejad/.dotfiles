
- name: Dotfiles config
  hosts: localhost
  connection: local
  gather_facts: true

  vars_files:
    - group_vars/all.yml

  pre_tasks:
    - name: Normalize distribution
      ansible.builtin.import_tasks: pre_tasks/normalize_distribution.yml
      tags:
        - always

    - name: Detect WSL
      ansible.builtin.import_tasks: pre_tasks/detect_wsl.yml
      tags:
        - always

    - name: Confirm Windows PowerShell Execution Policy
      ansible.builtin.import_tasks: pre_tasks/powershell_executionpolicy.yml
      when: ansible_host_environment_is_wsl
      tags:
        - always

    - name: Detect host user (WSL)
      ansible.builtin.import_tasks: pre_tasks/whoami_wsl.yml
      when: ansible_host_environment_is_wsl
      tags:
        - always

    - name: Detect host user
      ansible.builtin.import_tasks: pre_tasks/whoami.yml
      tags:
        - always

    - name: Detect sudo
      ansible.builtin.import_tasks: pre_tasks/detect_sudo.yml
      tags:
        - always

  tasks:
    - name: Set roles
      ansible.builtin.set_fact:
        run_roles: >-
          {%- set distro_exclude_roles = (exclude_roles_by_distribution | default({})).get(ansible_facts['distribution'], []) -%}
          {%- set default_excluded_roles = (exclude_roles | default([])) + distro_exclude_roles -%}
          {%- if ansible_run_tags | list == ['all'] -%}
          {{ default_roles | reject('in', default_excluded_roles) | list }}
          {%- else -%}
          {{ (default_roles | select('in', ansible_run_tags) | list) + (ansible_run_tags | reject('in', default_roles) | reject('equalto', 'all') | list) }}
          {%- endif -%}
      tags:
        - always

    - name: Run roles
      ansible.builtin.include_role:
        apply:
          tags:
            - "{{ roles_item }}"
        name: "{{ roles_item }}"
      loop_control:
        loop_var: roles_item
      loop: "{{ run_roles }}"
      tags:
        - always
